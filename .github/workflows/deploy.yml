name: Deploy Cloud Functions

on:
  # Manual-only. The CI deploy service account lacks the IAM to deploy Cloud
  # Functions (needs iam.serviceAccounts.actAs on the runtime SA + Cloud
  # Functions/Build/Run roles), so a push trigger just fails on every functions
  # change. Functions/rules are deployed manually via `firebase deploy` as an
  # owner. Re-add the push trigger below once the SA has been granted the roles.
  workflow_dispatch:

jobs:
  deploy-functions:
    name: Build & Deploy Cloud Functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firebase

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install function dependencies
        run: cd functions && npm install

      - name: Build functions
        run: cd functions && npm run build

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions,firestore:rules,storage --force
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          PROJECT_PATH: firebase
